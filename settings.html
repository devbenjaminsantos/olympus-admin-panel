<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Settings • Admin Panel</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="assets/css/styles.css">

</head>

<body>

<div class="container-fluid">
<div class="row">

<!-- Sidebar -->

<aside class="col-lg-2 d-none d-lg-flex flex-column p-0 border-end min-vh-100 bg-body">

<div class="p-3 border-bottom">

<div class="fw-semibold">Admin Panel</div>
<div class="small text-body-secondary">Generic SaaS</div>

</div>

<nav class="p-2">

<ul class="nav nav-pills flex-column gap-1">

<li class="nav-item">
<a class="nav-link" href="index.html">Dashboard</a>
</li>

<li class="nav-item">
<a class="nav-link" href="users.html">Users</a>
</li>

<li class="nav-item">
<a class="nav-link active" href="settings.html">Settings</a>
</li>

</ul>

</nav>

</aside>

<!-- Main -->

<main class="col-lg-10 p-4">

<h2 class="mb-4">Settings</h2>

<div class="card shadow-sm">

<div class="card-body">

<form>

<div class="mb-3">
<label class="form-label">Company name</label>
<input class="form-control" placeholder="Admin Panel Inc.">
</div>

<div class="mb-3">
<label class="form-label">Support email</label>
<input class="form-control" placeholder="support@example.com">
</div>

<div class="mb-3">
<label class="form-label">Default user role</label>

<select class="form-select">

<option>Viewer</option>
<option>Support</option>
<option>Manager</option>
<option>Admin</option>

</select>

</div>

<div class="form-check form-switch mb-3">

<input class="form-check-input" type="checkbox" id="notifications">

<label class="form-check-label">
Enable email notifications
</label>

</div>

<button class="btn btn-primary">
Save settings
</button>

</form>

</div>
</div>

</main>

</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/app.js"></script>

</body>
</html>
